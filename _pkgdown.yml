url: https://gchickering21.github.io/DownBallotR/

template:
  bootstrap: 5
  includes:
    in_header: |
      <!-- Google tag (gtag.js) -->
      <script async src="https://www.googletagmanager.com/gtag/js?id=G-PQ23RGE15T"></script>
      <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-PQ23RGE15T');
      </script>

navbar:
  structure:
    left: [intro, articles, reference]
    right: [github]
  components:
    github:
      icon: fa-github
      href: https://github.com/gchickering21/DownBallotR
      aria-label: GitHub

articles:
  - title: Getting started
    navbar: ~
    contents:
      - articles/python-setup
      - articles/beta-testing
  - title: Using the package
    navbar: ~
    contents:
      - articles/scraping-data
  - title: Scraper reference
    navbar: ~
    contents:
      - articles/election-stats
      - articles/north-carolina
      - articles/connecticut
      - articles/georgia
      - articles/utah
      - articles/indiana
      - articles/louisiana
  - title: About the data
    navbar: ~
    contents:
      - articles/data-dictionary
      - articles/datasheet
